<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 280" role="img" aria-label="Public DNS resolves to WAN IP and is dropped; split DNS resolves to tunnel IP and works" width="980" height="280"><rect data-bg="1" x="0" y="0" width="980" height="280" rx="14" fill="#0f1115"/>
        <defs>
          <marker id="ad" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#f87171"/></marker>
          <marker id="ae" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#22d3a6"/></marker>
        </defs>
        <!-- BAD -->
        <text x="20" y="30" fill="#f87171" font-size="13" font-weight="700">✗ Phone uses 1.1.1.1 → resolves to WAN IP 90.x.x.x</text>
        <g font-size="11.5" text-anchor="middle">
          <rect x="20" y="46" width="110" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d"/><text x="75" y="68" fill="#e6e9ef">Phone (VPN)</text><text x="75" y="84" fill="#9aa3b2" font-size="10">dst=90.x:8443</text>
          <rect x="190" y="46" width="120" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d"/><text x="250" y="74" fill="#e6e9ef">Windows host</text>
          <rect x="370" y="46" width="130" height="46" rx="8" fill="#2a1414" stroke="#f87171"/><text x="435" y="68" fill="#f87171">doesn't own 90.x</text><text x="435" y="84" fill="#d89090" font-size="10">→ default gateway</text>
          <rect x="560" y="46" width="120" height="46" rx="8" fill="#2a1414" stroke="#f87171"/><text x="620" y="68" fill="#f87171">home router drops it</text><text x="620" y="84" fill="#d89090" font-size="10">no rule for 8443</text>
          <rect x="740" y="46" width="120" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d" opacity="0.5"/><text x="800" y="74" fill="#6b7280">Traefik (never reached)</text>
        </g>
        <g stroke="#f87171" stroke-width="1.8" marker-end="url(#ad)">
          <line x1="130" y1="69" x2="188" y2="69"/>
          <line x1="310" y1="69" x2="368" y2="69"/>
          <line x1="500" y1="69" x2="558" y2="69"/>
        </g>

        <!-- GOOD -->
        <text x="20" y="160" fill="#22d3a6" font-size="13" font-weight="700">✓ Phone uses 10.8.0.1 (CoreDNS) → resolves to tunnel IP 10.8.0.1</text>
        <g font-size="11.5" text-anchor="middle">
          <rect x="20" y="176" width="110" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d"/><text x="75" y="198" fill="#e6e9ef">Phone (VPN)</text><text x="75" y="214" fill="#9aa3b2" font-size="10">dst=10.8.0.1:8443</text>
          <rect x="190" y="176" width="140" height="46" rx="8" fill="#102a22" stroke="#22d3a6"/><text x="260" y="198" fill="#22d3a6">Windows owns 10.8.0.1</text><text x="260" y="214" fill="#7fd9c0" font-size="10">WireGuard iface</text>
          <rect x="380" y="176" width="130" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d"/><text x="445" y="204" fill="#e6e9ef">portproxy → WSL2</text>
          <rect x="560" y="176" width="120" height="46" rx="8" fill="#13233f" stroke="#5b8cff"/><text x="620" y="204" fill="#5b8cff">Traefik :8443</text>
          <rect x="710" y="176" width="150" height="46" rx="8" fill="#102a22" stroke="#22d3a6"/><text x="785" y="204" fill="#22d3a6">Service loads ✓</text>
        </g>
        <g stroke="#22d3a6" stroke-width="1.8" marker-end="url(#ae)">
          <line x1="130" y1="199" x2="188" y2="199"/>
          <line x1="330" y1="199" x2="378" y2="199"/>
          <line x1="510" y1="199" x2="558" y2="199"/>
          <line x1="680" y1="199" x2="708" y2="199"/>
        </g>
        <text x="490" y="262" fill="#9aa3b2" font-size="12" text-anchor="middle">CoreDNS returns <tspan fill="#22d3a6" font-weight="700">10.8.0.1</tspan> for every <tspan fill="#cdd6f4">*.example.com</tspan> query, and forwards everything else normally.</text>
      </svg>