# Hugo configuration — PaperMod theme, multilingual (EN / FR / AR)
# Deployed on Cloudflare Pages. See README.md for build settings.
baseURL: "https://zakaria.ybeggazene.com/"
title: "Zakaria Ybeggazene"
theme: "PaperMod"

defaultContentLanguage: "en"
defaultContentLanguageInSubdir: false

enableInlineShortcodes: true
enableRobotsTXT: true
enableEmoji: true
buildDrafts: false
buildFuture: false

pagination:
  pagerSize: 5

# Allow raw HTML in Markdown (Cal.com / Stripe embeds, resume formatting)
markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false
    codeFences: true
    guessSyntax: true

# JSON output on the homepage powers PaperMod's Fuse.js search
outputs:
  home:
    - HTML
    - RSS
    - JSON

minify:
  disableXML: true

# ---- Parameters shared by all languages ----
params:
  env: production
  author: "Zakaria Ybeggazene"
  defaultTheme: auto
  disableThemeToggle: false
  ShowReadingTime: true
  ShowShareButtons: true
  ShowCodeCopyButtons: true
  ShowBreadCrumbs: true
  ShowPostNavLinks: true
  ShowWordCount: true
  ShowRssButtonInSectionTermList: true
  ShowToc: true
  TocOpen: false
  displayFullLangName: true
  ShowLanguageSwitcher: true
  comments: false

  # Favicons generated by realfavicongenerator.net; files live in static/.
  # PaperMod's head.html maps these params onto <link rel="icon"> tags.
  # NOTE: PaperMod's schema_json.html also reuses `favicon` as the schema.org
  # logo/image, so it points at a real raster PNG (not the .ico). The classic
  # /favicon.ico link is re-added in layouts/_partials/extend_head.html.
  assets:
    favicon: "/web-app-manifest-512x512.png"
    favicon16x16: "/favicon-96x96.png"
    favicon32x32: "/favicon-96x96.png"
    apple_touch_icon: "/apple-touch-icon.png"
    safari_pinned_tab: "/favicon.svg"
    theme_color: "#ffffff"

  # Social icons appear under the profile and in the footer
  socialIcons:
    - name: linkedin
      url: "https://linkedin.com/in/zakaria-ybeggazene"
    - name: github
      url: "https://github.com/zakaria-ybeggazene"
    - name: x
      url: "https://twitter.com/zakaria_ygz"
    - name: email
      url: "mailto:zakariaybeggazene@gmail.com"
    - name: rss
      url: "/index.xml"

  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]

# ---- Languages ----
