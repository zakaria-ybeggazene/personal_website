# Override theme's Arabic plurals: number before the unit, and add the
# missing `many` (11–99) form and the `words` key entirely.
- id: read_time
  translation:
    zero: "0 دقيقة"
    one: "دقيقة واحدة"
    two: "دقيقتان"
    few: "{{ .Count }} دقائق"
    many: "{{ .Count }} دقيقة"
    other: "{{ .Count }} دقيقة"

- id: words
  translation:
    zero: "0 كلمة"
    one: "كلمة واحدة"
    two: "كلمتان"
    few: "{{ .Count }} كلمات"
    many: "{{ .Count }} كلمة"
    other: "{{ .Count }} كلمة"
