<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 250" role="img" aria-label="Networking layers from internet to container" width="980" height="250"><rect data-bg="1" x="0" y="0" width="980" height="250" rx="14" fill="#0f1115"/>
        <defs>
          <marker id="a3" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
            <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#5b8cff"/>
          </marker>
        </defs>
        <!-- boxes left to right -->
        <g font-size="12" text-anchor="middle">
          <rect x="10"  y="90" width="120" height="60" rx="9" fill="#1c2030" stroke="#2a2f3d"/>
          <text x="70" y="116" fill="#e6e9ef" font-weight="700">Internet</text>
          <text x="70" y="134" fill="#9aa3b2" font-size="11">client</text>

          <rect x="150" y="90" width="120" height="60" rx="9" fill="#1c2030" stroke="#2a2f3d"/>
          <text x="210" y="112" fill="#e6e9ef" font-weight="700">home router router</text>
          <text x="210" y="130" fill="#9aa3b2" font-size="11">forwards 80/443</text>
          <text x="210" y="144" fill="#9aa3b2" font-size="11">UDP 51820</text>

          <rect x="290" y="90" width="130" height="60" rx="9" fill="#1c2030" stroke="#2a2f3d"/>
          <text x="355" y="112" fill="#e6e9ef" font-weight="700">Windows 11</text>
          <text x="355" y="130" fill="#9aa3b2" font-size="11">netsh portproxy</text>
          <text x="355" y="144" fill="#9aa3b2" font-size="11">TCP → WSL2 eth0</text>

          <rect x="440" y="90" width="120" height="60" rx="9" fill="#1c2030" stroke="#2a2f3d"/>
          <text x="500" y="112" fill="#e6e9ef" font-weight="700">WSL2</text>
          <text x="500" y="130" fill="#9aa3b2" font-size="11">Ubuntu 24.04</text>
          <text x="500" y="144" fill="#9aa3b2" font-size="11">Docker Engine</text>

          <rect x="580" y="90" width="130" height="60" rx="9" fill="#13233f" stroke="#5b8cff"/>
          <text x="645" y="112" fill="#5b8cff" font-weight="700">proxy network</text>
          <text x="645" y="130" fill="#9bb4ef" font-size="11">+ Traefik v3</text>
          <text x="645" y="144" fill="#9bb4ef" font-size="11">single ingress</text>

          <rect x="730" y="90" width="120" height="60" rx="9" fill="#102a22" stroke="#22d3a6"/>
          <text x="790" y="116" fill="#22d3a6" font-weight="700">Service</text>
          <text x="790" y="134" fill="#7fd9c0" font-size="11">container</text>
        </g>
        <!-- arrows -->
        <g stroke="#5b8cff" stroke-width="1.8" marker-end="url(#a3)">
          <line x1="130" y1="120" x2="148" y2="120"/>
          <line x1="270" y1="120" x2="288" y2="120"/>
          <line x1="420" y1="120" x2="438" y2="120"/>
          <line x1="560" y1="120" x2="578" y2="120"/>
          <line x1="710" y1="120" x2="728" y2="120"/>
        </g>
        <text x="490" y="40" fill="#e6e9ef" font-size="14" font-weight="700" text-anchor="middle">Internet → home router → Windows → WSL2 → Docker → Traefik → container</text>
        <text x="490" y="200" fill="#9aa3b2" font-size="12" text-anchor="middle">The single weak link is the Windows → WSL2 hop, which is exactly where the two hardest bugs lived.</text>
      </svg>