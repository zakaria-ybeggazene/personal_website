<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 250" role="img" aria-label="Double relay corrupts TLS, single relay fixes it" width="980" height="250"><rect data-bg="1" x="0" y="0" width="980" height="250" rx="14" fill="#0f1115"/>
        <defs>
          <marker id="ab" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#f87171"/></marker>
          <marker id="ag" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto"><path d="M0,0 L7,3.2 L0,6.4 Z" fill="#22d3a6"/></marker>
        </defs>
        <!-- BAD -->
        <text x="20" y="32" fill="#f87171" font-size="13" font-weight="700">✗ DOUBLE RELAY · re-segments TLS records → Cloudflare 525</text>
        <g font-size="11.5" text-anchor="middle">
          <rect x="20"  y="48" width="120" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d"/><text x="80" y="76" fill="#e6e9ef">Windows :443</text>
          <rect x="210" y="48" width="140" height="46" rx="8" fill="#2a1414" stroke="#f87171"/><text x="280" y="70" fill="#f87171">127.0.0.1 relay</text><text x="280" y="86" fill="#d89090" font-size="10">localhost forward</text>
          <rect x="420" y="48" width="140" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d"/><text x="490" y="76" fill="#e6e9ef">WSL2 eth0</text>
          <rect x="630" y="48" width="120" height="46" rx="8" fill="#13233f" stroke="#5b8cff"/><text x="690" y="76" fill="#5b8cff">Traefik</text>
        </g>
        <g stroke="#f87171" stroke-width="1.8" marker-end="url(#ab)">
          <line x1="140" y1="71" x2="208" y2="71"/>
          <line x1="350" y1="71" x2="418" y2="71"/>
          <line x1="560" y1="71" x2="628" y2="71"/>
        </g>
        <!-- GOOD -->
        <text x="20" y="150" fill="#22d3a6" font-size="13" font-weight="700">✓ SINGLE RELAY · straight to eth0 → TLS intact</text>
        <g font-size="11.5" text-anchor="middle">
          <rect x="20"  y="166" width="120" height="46" rx="8" fill="#1c2030" stroke="#2a2f3d"/><text x="80" y="194" fill="#e6e9ef">Windows :443</text>
          <rect x="420" y="166" width="140" height="46" rx="8" fill="#1c2030" stroke="#22d3a6"/><text x="490" y="188" fill="#22d3a6">WSL2 eth0</text><text x="490" y="204" fill="#7fd9c0" font-size="10">direct target</text>
          <rect x="630" y="166" width="120" height="46" rx="8" fill="#13233f" stroke="#5b8cff"/><text x="690" y="194" fill="#5b8cff">Traefik</text>
        </g>
        <g stroke="#22d3a6" stroke-width="1.8" marker-end="url(#ag)">
          <line x1="140" y1="189" x2="418" y2="189"/>
          <line x1="560" y1="189" x2="628" y2="189"/>
        </g>
      </svg>