<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 430" role="img" aria-label="Public path through Cloudflare versus private path through WireGuard" width="980" height="430"><rect data-bg="1" x="0" y="0" width="980" height="430" rx="14" fill="#0f1115"/>
        <defs>
          <marker id="a2" markerWidth="9" markerHeight="9" refX="7" refY="3.2" orient="auto">
            <path d="M0,0 L7,3.2 L0,6.4 Z" fill="#9aa3b2"/>
          </marker>
        </defs>

        <!-- PUBLIC PATH (top) -->
        <text x="20" y="36" fill="#f6821f" font-size="13" font-weight="700" letter-spacing="1">PUBLIC PATH · port 443</text>
        <!-- browser -->
        <rect x="20" y="50" width="120" height="56" rx="9" fill="#1c2030" stroke="#2a2f3d"/>
        <text x="80" y="74" fill="#e6e9ef" font-size="13" text-anchor="middle" font-weight="600">Browser</text>
        <text x="80" y="92" fill="#9aa3b2" font-size="11" text-anchor="middle">anyone, anywhere</text>
        <!-- cloudflare -->
        <rect x="190" y="50" width="140" height="56" rx="9" fill="#3a2410" stroke="#f6821f"/>
        <text x="260" y="74" fill="#f6821f" font-size="13" text-anchor="middle" font-weight="700">Cloudflare</text>
        <text x="260" y="92" fill="#d8a878" font-size="11" text-anchor="middle">orange cloud · DDoS · cache</text>
        <!-- ghost -->
        <rect x="800" y="50" width="160" height="56" rx="9" fill="#102a22" stroke="#22d3a6"/>
        <text x="880" y="74" fill="#22d3a6" font-size="13" text-anchor="middle" font-weight="700">Ghost blog</text>
        <text x="880" y="92" fill="#7fd9c0" font-size="11" text-anchor="middle">public content</text>
        <line x1="140" y1="78" x2="186" y2="78" stroke="#9aa3b2" stroke-width="1.6" marker-end="url(#a2)"/>
        <line x1="330" y1="78" x2="430" y2="78" stroke="#9aa3b2" stroke-width="1.6" marker-end="url(#a2)"/>

        <!-- PRIVATE PATH (bottom) -->
        <text x="20" y="180" fill="#a78bfa" font-size="13" font-weight="700" letter-spacing="1">PRIVATE PATH · port 8443 (never forwarded)</text>
        <!-- phone -->
        <rect x="20" y="194" width="120" height="56" rx="9" fill="#1c2030" stroke="#2a2f3d"/>
        <text x="80" y="218" fill="#e6e9ef" font-size="13" text-anchor="middle" font-weight="600">Your phone</text>
        <text x="80" y="236" fill="#9aa3b2" font-size="11" text-anchor="middle">WireGuard client</text>
        <!-- wireguard tunnel -->
        <rect x="190" y="194" width="140" height="56" rx="9" fill="#241a3a" stroke="#a78bfa"/>
        <text x="260" y="218" fill="#a78bfa" font-size="13" text-anchor="middle" font-weight="700">WireGuard</text>
        <text x="260" y="236" fill="#c4b5fd" font-size="11" text-anchor="middle">encrypted UDP tunnel</text>
        <!-- private services -->
        <rect x="800" y="180" width="160" height="40" rx="9" fill="#102a22" stroke="#22d3a6"/>
        <text x="880" y="205" fill="#22d3a6" font-size="12.5" text-anchor="middle" font-weight="700">Actual Budget</text>
        <rect x="800" y="226" width="160" height="40" rx="9" fill="#102a22" stroke="#22d3a6"/>
        <text x="880" y="251" fill="#22d3a6" font-size="12.5" text-anchor="middle" font-weight="700">Stirling PDF</text>
        <line x1="140" y1="222" x2="186" y2="222" stroke="#9aa3b2" stroke-width="1.6" marker-end="url(#a2)"/>
        <line x1="330" y1="222" x2="430" y2="222" stroke="#9aa3b2" stroke-width="1.6" marker-end="url(#a2)"/>

        <!-- TRAEFIK shared box (center-right) -->
        <rect x="440" y="50" width="120" height="216" rx="11" fill="#13233f" stroke="#5b8cff" stroke-width="1.6"/>
        <text x="500" y="150" fill="#5b8cff" font-size="15" text-anchor="middle" font-weight="800">Traefik v3</text>
        <text x="500" y="170" fill="#9bb4ef" font-size="11" text-anchor="middle">single ingress</text>
        <text x="500" y="186" fill="#9bb4ef" font-size="11" text-anchor="middle">wildcard TLS</text>
        <text x="500" y="202" fill="#9bb4ef" font-size="11" text-anchor="middle">*.example.com</text>
        <!-- two entrypoints -->
        <rect x="452" y="70" width="96" height="26" rx="6" fill="#3a2410" stroke="#f6821f"/>
        <text x="500" y="87" fill="#f6821f" font-size="11" text-anchor="middle" font-weight="700">:443 websecure</text>
        <rect x="452" y="222" width="96" height="26" rx="6" fill="#241a3a" stroke="#a78bfa"/>
        <text x="500" y="239" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="700">:8443 internal</text>
        <!-- from traefik to services -->
        <line x1="560" y1="83" x2="796" y2="78" stroke="#9aa3b2" stroke-width="1.6" marker-end="url(#a2)"/>
        <line x1="560" y1="235" x2="796" y2="200" stroke="#9aa3b2" stroke-width="1.6" marker-end="url(#a2)"/>
        <line x1="560" y1="235" x2="796" y2="246" stroke="#9aa3b2" stroke-width="1.6" marker-end="url(#a2)"/>

        <!-- separator note -->
        <line x1="20" y1="300" x2="960" y2="300" stroke="#2a2f3d" stroke-dasharray="3 5"/>
        <text x="20" y="332" fill="#9aa3b2" font-size="12.5">The router forwards only <tspan fill="#f6821f" font-weight="700">80</tspan>, <tspan fill="#f6821f" font-weight="700">443</tspan> and <tspan fill="#a78bfa" font-weight="700">UDP 51820</tspan>. Port <tspan fill="#a78bfa" font-weight="700">8443</tspan> is deliberately absent,</text>
        <text x="20" y="354" fill="#9aa3b2" font-size="12.5">so private services are simply unreachable from the open internet, no matter what their DNS resolves to.</text>
      </svg>