<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 980 300" role="img" aria-label="Current running services grouped by path" width="980" height="300"><rect data-bg="1" x="0" y="0" width="980" height="300" rx="14" fill="#0f1115"/>
        <!-- infra column -->
        <text x="160" y="28" fill="#5b8cff" font-size="13" font-weight="700" text-anchor="middle">INFRASTRUCTURE</text>
        <g font-size="12" text-anchor="middle">
          <rect x="40" y="44" width="240" height="34" rx="7" fill="#13233f" stroke="#5b8cff"/><text x="160" y="65" fill="#9bb4ef">Traefik v3 · ingress + wildcard TLS</text>
          <rect x="40" y="86" width="240" height="34" rx="7" fill="#1c2030" stroke="#2a2f3d"/><text x="160" y="107" fill="#e6e9ef">CrowdSec · edge IP banning</text>
          <rect x="40" y="128" width="240" height="34" rx="7" fill="#1c2030" stroke="#2a2f3d"/><text x="160" y="149" fill="#e6e9ef">Watchtower · auto-updates</text>
          <rect x="40" y="170" width="240" height="34" rx="7" fill="#1c2030" stroke="#2a2f3d"/><text x="160" y="191" fill="#e6e9ef">ddns-updater · dynamic DNS</text>
          <rect x="40" y="212" width="240" height="34" rx="7" fill="#1c2030" stroke="#2a2f3d"/><text x="160" y="233" fill="#e6e9ef">WireGuard + CoreDNS (native)</text>
        </g>
        <!-- public column -->
        <text x="490" y="28" fill="#f6821f" font-size="13" font-weight="700" text-anchor="middle">PUBLIC (:443)</text>
        <g font-size="12" text-anchor="middle">
          <rect x="370" y="44" width="240" height="42" rx="7" fill="#3a2410" stroke="#f6821f"/><text x="490" y="62" fill="#f6821f" font-weight="700">Ghost</text><text x="490" y="78" fill="#d8a878" font-size="10.5">this blog · Cloudflare-proxied</text>
          <rect x="370" y="96" width="240" height="42" rx="7" fill="#1c2030" stroke="#2a2f3d"/><text x="490" y="114" fill="#e6e9ef" font-weight="700">www redirect</text><text x="490" y="130" fill="#9aa3b2" font-size="10.5">→ blog.example.com</text>
        </g>
        <!-- private column -->
        <text x="820" y="28" fill="#a78bfa" font-size="13" font-weight="700" text-anchor="middle">PRIVATE (:8443, VPN)</text>
        <g font-size="12" text-anchor="middle">
          <rect x="700" y="44" width="240" height="42" rx="7" fill="#241a3a" stroke="#a78bfa"/><text x="820" y="62" fill="#a78bfa" font-weight="700">Actual Budget</text><text x="820" y="78" fill="#c4b5fd" font-size="10.5">personal finance</text>
          <rect x="700" y="96" width="240" height="42" rx="7" fill="#241a3a" stroke="#a78bfa"/><text x="820" y="114" fill="#a78bfa" font-weight="700">Stirling PDF</text><text x="820" y="130" fill="#c4b5fd" font-size="10.5">documents · 100MB uploads</text>
          <rect x="700" y="148" width="240" height="42" rx="7" fill="#1c2030" stroke="#2a2f3d" stroke-dasharray="4 3"/><text x="820" y="166" fill="#9aa3b2" font-weight="700">coming soon</text><text x="820" y="182" fill="#6b7280" font-size="10.5">photos · media · dashboards</text>
        </g>
        <text x="490" y="285" fill="#9aa3b2" font-size="12" text-anchor="middle">All defined in one private GitHub repo · portable to a VPS with <tspan fill="#cdd6f4">git clone</tspan> + restore secrets + bootstrap.</text>
      </svg>